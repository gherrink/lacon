id: pkg-install
description: npm / pnpm / yarn install
# D-10: match concrete install invocations only (npm/pnpm/yarn install + pnpm i + pnpm add).
# Does NOT match `pnpm test` / `pnpm lint` (resolution-dependent aliases).
match:
  any:
    - { command: npm, args_prefix: [install] }
    - { command: pnpm, args_prefix: [install] }
    - { command: pnpm, args_prefix: [i] }
    - { command: pnpm, args_prefix: [add] }
    - { command: yarn, args_prefix: [install] }
# D-11: NO rewrite block. Research empirically proved that the only cross-manager
# silent flag (`--silent`) suppresses ALL error output on failure for npm and pnpm
# (0 bytes, exit 1) — the E404 error is deleted before lacon ever sees it, violating
# the no-drop contract. All reduction is pipeline-side only.
pipeline:
  - strip_ansi
  - drop_regex: '^npm warn deprecated '
  - drop_regex: '^\[WARN\] '
  - drop_regex: '^Progress: '
  - drop_regex: '^\s*[╭│╰]'
  - drop_regex: '^Packages: \+'
  - drop_regex: '^\++$'
  - drop_regex: '^\[[0-9]/4\] '
  - drop_regex: '^info '
  # WR-04 tradeoff: this also drops yarn-classic `warning <pkg> has unmet peer
  # dependency` / deprecation lines on the SUCCESS path (reduction is the goal here).
  # Install ERRORS are on the failure path and preserved by on_error, never here.
  - drop_regex: '^warning '
  - drop_regex: '^success '
  - drop_regex: '^\d+ packages are looking for funding'
  - drop_regex: '^  run `npm fund`'
  - drop_regex: '^Some issues need review'
  - drop_regex: '^a different dependency'
  - drop_regex: '^Run `npm audit`'
  # NO max_bytes — auto-injected (D-07).
on_error:
  pipeline:
    - strip_ansi
    - keep_around_match: { pattern: '(?i)(error|ERR_|fatal)', before: 1, after: 10 }
    # keep_head (not keep_tail): the first install error (e.g. E404) is the root
    # cause; cap from the top so it survives if errors overflow the cap (WR-01).
    - keep_head: { lines: 40 }
